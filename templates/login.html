{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Omdev Admin Login</title>
    <link
        rel="icon"
        type="image/x-icon"
        href="{% static 'images/favicon.ico' %}"
    >

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{

            height:100vh;

            overflow:hidden;

            font-family:'Poppins',sans-serif;

            background:
            linear-gradient(
                rgba(0,0,0,0.75),
                rgba(0,0,0,0.75)
            ),

            url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1974');

            background-size:cover;

            background-position:center;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .login-box{

            width:430px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.15);

            padding:45px;

            border-radius:30px;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.35);

            color:white;

            animation:fadeUp 0.8s ease;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .login-logo{

            text-align:center;

            margin-bottom:25px;
        }

        .login-logo img{

            width:140px;

            margin-bottom:15px;
        }

        .subtitle{

            color:#ddd;

            text-align:center;

            margin-bottom:35px;
        }

        .form-control{

            height:58px;

            background:rgba(255,255,255,0.08);

            border:none;

            color:white;

            border-radius:16px;

            margin-bottom:22px;

            padding-left:18px;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.12);

            color:white;

            box-shadow:none;

            border:1px solid #0d8bff;
        }

        .form-control::placeholder{
            color:#ccc;
        }

        .btn-login{

            width:100%;

            height:58px;

            background:#0d8bff;

            border:none;

            border-radius:16px;

            color:white;

            font-weight:600;

            transition:0.3s;
        }

        .btn-login:hover{

            background:#0070d8;

            transform:translateY(-2px);
        }

        .footer-text{

            margin-top:25px;

            text-align:center;

            color:#ccc;

            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="login-logo">

        <img src="{% static 'images/omdev-logo.jpg' %}">

    </div>

    <div class="subtitle">

        Luxury Property Management Dashboard

    </div>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="form-control"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="form-control"
        >

        <button class="btn-login">

            Login

        </button>

    </form>

    <div class="footer-text">

        Powered by Vibrant Digitech

    </div>

</div>

</body>

</html>
