{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Omdev Admin</title>
    <link
        rel="icon"
        type="image/x-icon"
        href="{% static 'images/favicon.ico' %}"
    >


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    height:100%;
}

body{
    background:#f5f7fb;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

.main-wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:290px;

    background:linear-gradient(
        180deg,
        #0f172a,
        #111827
    );

    padding:30px;

    position:fixed;

    top:0;

    left:0;

    height:100vh;

    overflow-y:auto;

    box-shadow:
    5px 0 30px rgba(0,0,0,0.08);

    z-index:1000;

    transition:0.3s;
}

.logo{
    text-align:center;
    margin-bottom:50px;
}

.logo img{

    width:170px;

    max-width:100%;

    object-fit:contain;

    margin-bottom:15px;
}

.logo h3{

    color:white;

    font-weight:700;

    letter-spacing:1px;

    font-size:24px;
}

.logo span{
    color:#0d8bff;
}

.menu a{

    display:flex;

    align-items:center;

    gap:14px;

    color:#cbd5e1;

    text-decoration:none;

    padding:15px 18px;

    border-radius:16px;

    margin-bottom:15px;

    transition:0.3s;

    font-weight:500;
}

.menu a:hover{

    background:#0d8bff;

    color:white;

    transform:translateX(5px);
}

.logout-btn{

    width:100%;

    background:none;

    border:none;

    display:flex;

    align-items:center;

    gap:14px;

    color:#cbd5e1;

    padding:15px 18px;

    border-radius:16px;

    transition:0.3s;

    text-align:left;

    font-size:16px;

    font-weight:500;
}

.logout-btn:hover{

    background:#ef4444;

    color:white;

    transform:translateX(5px);
}

/* PAGE */

.page-wrapper{

    margin-left:290px;

    width:calc(100% - 290px);

    display:flex;

    flex-direction:column;

    min-height:100vh;
}

.content{

    flex:1;

    padding:35px;
}

/* TOPBAR */

.topbar{

    background:white;

    padding:22px 30px;

    border-radius:24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.05);
}

.welcome h4{
    margin-bottom:4px;
    font-weight:700;
}

.welcome p{
    color:#888;
    margin:0;
}

.profile{

    display:flex;

    align-items:center;

    gap:15px;
}

.profile-circle{

    width:48px;

    height:48px;

    border-radius:50%;

    background:#0d8bff;

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-weight:600;
}

/* FOOTER */

.footer{

    background:white;

    padding:20px;

    text-align:center;

    color:#666;

    border-top:1px solid #eee;

    margin-top:auto;
}

.footer span{

    color:#0d8bff;

    font-weight:600;
}

/* MOBILE */

.mobile-toggle{

    display:none;

    position:fixed;

    top:20px;

    left:20px;

    width:50px;

    height:50px;

    background:#0d8bff;

    color:white;

    border:none;

    border-radius:12px;

    z-index:2000;

    font-size:22px;
}

/* RESPONSIVE */

@media(max-width:991px){

    .mobile-toggle{
        display:block;
    }

    .sidebar{

        left:-100%;
    }

    .sidebar.active{

        left:0;
    }

    .page-wrapper{

        margin-left:0;

        width:100%;
    }

    .content{

        padding:90px 20px 20px 20px;
    }

    .topbar{

        flex-direction:column;

        align-items:flex-start;

        gap:15px;
    }

    .profile{
        width:100%;
        justify-content:space-between;
    }

}

    </style>

</head>

<body>
    <button
    class="mobile-toggle"
    onclick="toggleSidebar()"
>

    <i class="bi bi-list"></i>

</button>

<div class="main-wrapper">

    <div class="sidebar">

        <div class="logo">

            <img
                src="{% static 'images/omdev-logo.jpg' %}"
                alt="Omdev Logo"
            >

            <h3>
                OMDEV <span>ADMIN</span>
            </h3>

        </div>

        <div class="menu">

            <a href="{% url 'dashboard' %}">

                <i class="bi bi-grid"></i>

                Dashboard

            </a>

            <a href="{% url 'add_property' %}">

                <i class="bi bi-building"></i>

                Add Property

            </a>

            <form
                method="POST"
                action="{% url 'logout' %}"
            >

                {% csrf_token %}

                <button
                    type="submit"
                    class="logout-btn"
                >

                    <i class="bi bi-box-arrow-right"></i>

                    Logout

                </button>

            </form>

        </div>

    </div>

    <div class="page-wrapper">

        <div class="content">

            <div class="topbar">

                <div class="welcome">

                    <h4>
                        Welcome Back 👋
                    </h4>

                    <p>
                        Manage luxury real estate listings
                    </p>

                </div>

                <div class="profile">

                    <div>
                        {{ request.user.username }}
                    </div>

                    <div class="profile-circle">

                        {{ request.user.username|first|upper }}

                    </div>

                </div>

            </div>

            {% block content %}
            {% endblock %}

        </div>

        <div class="footer">

            Powered by <span>Vibrant Digitech</span>

        </div>

    </div>

</div>

<script>

    function toggleSidebar(){

        document
        .querySelector('.sidebar')
        .classList
        .toggle('active');
    }

</script>
</body>

</html>
