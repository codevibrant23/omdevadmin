{% extends 'base.html' %}

{% block content %}

<style>

    .form-card{

        background:white;

        padding:45px;

        border-radius:28px;

        box-shadow:
        0 10px 30px rgba(0,0,0,0.05);

        animation:fadeUp 0.7s ease;
    }

    @keyframes fadeUp{

        from{
            opacity:0;
            transform:translateY(30px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .form-title{

        font-size:32px;

        font-weight:700;

        margin-bottom:8px;
    }

    .form-subtitle{

        color:#777;

        margin-bottom:35px;
    }

    label{

        margin-bottom:10px;

        font-weight:600;
    }

    input,
    textarea,
    select{

        width:100%;

        border:1px solid #e5e7eb;

        border-radius:16px;

        padding:15px;

        outline:none;

        transition:0.3s;

        background:#fafafa;
    }

    input:focus,
    textarea:focus,
    select:focus{

        border-color:#0d8bff;

        background:white;

        box-shadow:
        0 0 0 4px rgba(13,139,255,0.1);
    }

    .save-btn{

        background:#0d8bff;

        color:white;

        border:none;

        padding:16px 30px;

        border-radius:16px;

        font-weight:600;

        transition:0.3s;
    }

    .save-btn:hover{

        background:#0070d8;

        transform:translateY(-2px);
    }

</style>

<div class="form-card">

    <div class="form-title">

        Add Property

    </div>

    <div class="form-subtitle">

        Create and manage luxury real estate listings

    </div>

    <form method="POST" enctype="multipart/form-data">



        <div class="row">

            <div class="col-md-6 mb-4"><label>Title</label><input type="text" name="title" value="{{ property.title }}" required></div>
            <div class="col-md-6 mb-4"><label>Property Type</label><select name="property_type" required><option value="residential" {% if property.property_type == 'residential' %}selected{% endif %}>Residential</option><option value="commercial" {% if property.property_type == 'commercial' %}selected{% endif %}>Commercial</option></select></div>
            <div class="col-md-6 mb-4"><label>City</label><input type="text" name="city" value="{{ property.city }}" required></div>
            <div class="col-md-6 mb-4"><label>Bedrooms</label><input type="number" name="bedrooms" value="{{ property.bedrooms }}" required></div>
            <div class="col-md-6 mb-4"><label>Bathrooms</label><input type="number" name="bathrooms" value="{{ property.bathrooms }}" required></div>
            <div class="col-md-6 mb-4"><label>Area</label><input type="text" name="area" value="{{ property.area }}" required></div>
            <div class="col-md-6 mb-4"><label>Price</label><input type="text" name="price" value="{{ property.price }}" required></div>
            <div class="col-md-6 mb-4"><label>Featured Image</label><input type="file" name="featured_image" accept="image/*" {% if not property %}required{% endif %}></div>
            <div class="col-12 mb-4"><label>Address</label><textarea name="address" rows="2" required>{{ property.address }}</textarea></div>
            <div class="col-12 mb-4"><label>Description</label><textarea name="description" rows="4" required>{{ property.description }}</textarea></div>

        </div>

        <button
            class="save-btn"
        >

            Save Property

        </button>

    </form>

</div>

{% endblock %}
